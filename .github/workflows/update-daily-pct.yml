name: Update Daily Portfolio % Change

on:
  schedule:
    # 22:15 UTC = 15 นาทีหลัง update-daily-close.yml (ให้ price_history ของวันนี้บันทึกเสร็จก่อน)
    - cron: '15 22 * * 1-5'
  workflow_dispatch:   # กดรันมือได้จากแท็บ Actions

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: คำนวณ % เปลี่ยนแปลงพอร์ต (ถ่วงน้ำหนักด้วยมูลค่า) แล้วล็อกเข้า daily_pct
        env:
          SUPABASE_URL: 'https://edfahiauntmidsoviqft.supabase.co'
          SUPABASE_KEY: 'sb_publishable_u5JVuFHwvad2HSkef-ShZA_50gvcF3m'
        run: |
          python3 - << 'PYEOF'
          import urllib.request, json, datetime, os

          SUPABASE_URL = os.environ['SUPABASE_URL']
          SUPABASE_KEY = os.environ['SUPABASE_KEY']

          def sb_get(path):
              req = urllib.request.Request(
                  f'{SUPABASE_URL}/rest/v1/{path}',
                  headers={'apikey': SUPABASE_KEY, 'Authorization': f'Bearer {SUPABASE_KEY}'}
              )
              with urllib.request.urlopen(req, timeout=15) as r:
                  return json.loads(r.read().decode('utf-8'))

          def sb_upsert(path, body, on_conflict):
              data = json.dumps(body).encode('utf-8')
              req = urllib.request.Request(
                  f'{SUPABASE_URL}/rest/v1/{path}?on_conflict={on_conflict}',
                  data=data, method='POST',
                  headers={
                      'apikey': SUPABASE_KEY,
                      'Authorization': f'Bearer {SUPABASE_KEY}',
                      'Content-Type': 'application/json',
                      'Prefer': 'resolution=merge-duplicates,return=minimal',
                  }
              )
              with urllib.request.urlopen(req, timeout=15) as r:
                  return r.status

          today = datetime.date.today().isoformat()

          # ---- 0) วันหยุดตลาดหุ้นสหรัฐฯ (NYSE/Nasdaq) ปี 2026 -- ตลาดปิดทั้งวัน ไม่มีการเทรด ----
          NYSE_HOLIDAYS_2026 = {
              '2026-01-01', '2026-01-19', '2026-02-16', '2026-04-03', '2026-05-25',
              '2026-06-19', '2026-07-03', '2026-09-07', '2026-11-26', '2026-12-25',
          }
          if today in NYSE_HOLIDAYS_2026:
              print(f'📅 {today} เป็นวันหยุดตลาดหุ้นสหรัฐฯ (ตลาดปิดทั้งวัน) -- ข้ามการคำนวณ % วันนี้ (ไม่บันทึกอะไรเลย)')
              raise SystemExit(0)

          # ---- 1) โหลดหุ้นทั้งหมดในพอร์ต (ต้องมีจำนวนหุ้น) ----
          stocks = sb_get('stocks?select=ticker,shares')
          stocks = [s for s in stocks if s.get('ticker') and float(s.get('shares') or 0) > 0]
          print(f'พบหุ้นในพอร์ต {len(stocks)} ตัว')

          num, den, covered_value, total_value = 0.0, 0.0, 0.0, 0.0
          skipped_no_data = []
          skipped_outlier = []

          for s in stocks:
              ticker = s['ticker']
              shares = float(s['shares'])

              # ---- 2) ราคาปิดของ "วันนี้" ----
              today_rows = sb_get(f'price_history?ticker=eq.{ticker}&date=eq.{today}&select=price')
              if not today_rows:
                  skipped_no_data.append(ticker)
                  continue
              price_today = float(today_rows[0]['price'])
              total_value += shares * price_today

              # ---- 3) ราคาปิดของวันทำการก่อนหน้า (วันล่าสุดที่ < วันนี้) ----
              prev_rows = sb_get(
                  f'price_history?ticker=eq.{ticker}&date=lt.{today}&select=price,date'
                  f'&order=date.desc&limit=1'
              )
              if not prev_rows:
                  skipped_no_data.append(ticker)
                  continue
              prev_close = float(prev_rows[0]['price'])
              if prev_close <= 0:
                  skipped_no_data.append(ticker)
                  continue

              # ---- 4) safety net: ตัดตัวที่ขยับเกิน ±50% ใน 1 วัน (ราคาน่าจะพัง) ----
              ticker_pct = (price_today - prev_close) / prev_close * 100
              if abs(ticker_pct) > 50:
                  skipped_outlier.append(f'{ticker}({ticker_pct:.1f}%)')
                  continue

              num += shares * (price_today - prev_close)
              den += shares * prev_close
              covered_value += shares * price_today

          print(f'⏭️  ไม่มีข้อมูลราคาพอ ({len(skipped_no_data)}): {skipped_no_data}')
          if skipped_outlier:
              print(f'⚠️  ตัดออกเพราะราคาผิดปกติ ({len(skipped_outlier)}): {skipped_outlier}')

          if den <= 0 or total_value <= 0:
              print('❌ ไม่มีข้อมูลพอจะคำนวณ % วันนี้ได้ (ข้าม ไม่บันทึก)')
          elif covered_value / total_value < 0.6:
              print(f'❌ ข้อมูลราคาครอบคลุมพอร์ตแค่ {covered_value/total_value*100:.1f}% (ต้อง >= 60%) ข้าม ไม่บันทึก')
          else:
              result = (num / den) * 100
              if abs(result) > 20:
                  print(f'❌ % รวมพอร์ตออกมา {result:.2f}% ซึ่งดูผิดปกติเกินไป (เกิน ±20%) ข้าม ไม่บันทึก')
              else:
                  pct = round(result, 2)
                  sb_upsert('daily_pct', {'date': today, 'pct': pct, 'finalized': True}, on_conflict='date')
                  print(f'✅ บันทึก daily_pct: {today} = {pct}% (finalized)')
          PYEOF
