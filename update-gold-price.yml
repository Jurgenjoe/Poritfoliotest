name: Update Gold Price

on:
  schedule:
    - cron: '*/30 * * * *'   # ทุก 30 นาที
  workflow_dispatch:           # กดรันมือได้จากแท็บ Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ดึงราคาทองจากหลายแหล่ง แล้วเลือกแหล่งที่สำเร็จ
        run: |
          python3 - << 'PYEOF'
          import urllib.request, json, re, datetime, sys

          def fetch(url, headers=None):
              req = urllib.request.Request(url, headers=headers or {
                  'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36',
                  'Accept': 'application/json, text/html, */*',
                  'Accept-Language': 'th,en;q=0.9',
              })
              with urllib.request.urlopen(req, timeout=10) as r:
                  return r.read().decode('utf-8', errors='ignore')

          now = datetime.datetime.now(datetime.timezone(datetime.timedelta(hours=7)))
          date_str = now.strftime('%d/%m/%Y')
          time_str = now.strftime('%H:%M')

          buy, sell = None, None
          source = ''

          # --- แหล่งที่ 1: goldtraders.or.th scrape ---
          try:
              html = fetch('https://www.goldtraders.or.th/', headers={
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124',
                  'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
                  'Accept-Language': 'th-TH,th;q=0.9,en;q=0.8',
                  'Referer': 'https://www.google.co.th/',
              })
              # หาราคาทองคำแท่ง (buy/sell) จาก HTML
              # วิธีที่แม่นยำกว่า: หาคู่ตัวเลขที่อยู่ติดกัน (buy, sell) ในรูปแบบ
              # "XX,XXX.XX</td>...<td>XX,XXX.XX" รอบๆ คำว่า "ทองคำแท่ง"
              # แทนการกวาดทุกตัวเลขในหน้า (ซึ่งโดนปนกับราคาย้อนหลัง/ปี พ.ศ./โฆษณา)
              idx = html.find('ทองคำแท่ง')
              search_zone = html[idx:idx+1500] if idx != -1 else html

              # จับคู่ราคาที่เป็นทศนิยม .00 ติดกัน 2 ค่า (buy, sell) ซึ่งเป็นรูปแบบที่
              # goldtraders.or.th ใช้แสดงผลเสมอ และกว้างพอรับราคาทองได้ทุกช่วง (ไม่ผูกกับ range ตายตัว)
              pairs = re.findall(
                  r'(\d{1,3}(?:,\d{3})*\.\d{2})\D{1,40}?(\d{1,3}(?:,\d{3})*\.\d{2})',
                  search_zone
              )
              for b_str, s_str in pairs:
                  b = float(b_str.replace(',', ''))
                  s = float(s_str.replace(',', ''))
                  # buy ต้องน้อยกว่า sell เสมอ (กฎพื้นฐานของราคาซื้อ-ขาย) และต้องอยู่ในช่วงราคาทองที่สมเหตุสมผล
                  if 20000 <= b <= 150000 and 20000 <= s <= 150000 and s > b and (s - b) < 1000:
                      buy, sell = round(b), round(s)
                      source = 'goldtraders.or.th (scraped)'
                      print(f'[1] goldtraders scrape OK: buy={buy} sell={sell}')
                      break
          except Exception as e:
              print(f'[1] goldtraders scrape failed: {e}')

          # --- แหล่งที่ 2: fawazahmed0 XAU->THB (jsdelivr CDN, reliable) ---
          if not buy:
              try:
                  raw = fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/xau.json')
                  d = json.loads(raw)
                  xau_thb = d['xau']['thb']   # ราคา 1 troy oz เป็น THB
                  # แปลงเป็นราคาต่อบาทไทย (1 บาทไทย = 15.244 กรัม, 1 troy oz = 31.1035 กรัม)
                  price_per_baht = round((xau_thb / 31.1035) * 15.244)
                  # spread ทองแท่ง ~150-200 บาท
                  buy  = price_per_baht - 100
                  sell = price_per_baht + 100
                  source = 'fawazahmed0 XAU/THB (ประมาณการ)'
                  print(f'[2] fawazahmed OK: xau_thb={xau_thb}, per_baht≈{price_per_baht}')
              except Exception as e:
                  print(f'[2] fawazahmed failed: {e}')

          # --- แหล่งที่ 3: goldprice.org ---
          if not buy:
              try:
                  raw = fetch('https://data-asg.goldprice.org/dbXRates/THB')
                  d = json.loads(raw)
                  xau_thb = float(d['items'][0]['xauPrice'])
                  price_per_baht = round((xau_thb / 31.1035) * 15.244)
                  buy  = price_per_baht - 100
                  sell = price_per_baht + 100
                  source = 'goldprice.org (ประมาณการ)'
                  print(f'[3] goldprice.org OK: xau_thb={xau_thb}, per_baht≈{price_per_baht}')
              except Exception as e:
                  print(f'[3] goldprice.org failed: {e}')

          if not buy:
              print('ERROR: ดึงราคาทองไม่สำเร็จจากทุกแหล่ง')
              sys.exit(1)

          result = {
              "status": "success",
              "response": {
                  "update_date": date_str,
                  "update_time": time_str,
                  "price": {
                      "gold": {
                          "buy":  str(buy),
                          "sell": str(sell)
                      },
                      "gold_bar": {
                          "buy":  str(buy),
                          "sell": str(sell)
                      }
                  }
              }
          }

          with open('gold-price.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, ensure_ascii=False, indent=2)

          print(f'✅ เขียน gold-price.json สำเร็จ (source: {source})')
          print(json.dumps(result, ensure_ascii=False, indent=2))
          PYEOF

      - name: Commit ถ้ามีการเปลี่ยนแปลง
        run: |
          git config user.name "gold-price-bot"
          git config user.email "actions@users.noreply.github.com"
          git add gold-price.json
          git diff --cached --quiet || git commit -m "อัปเดตราคาทอง $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin main
          git push
